<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1d4ed8"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Server rack, left -->
  <rect x="110" y="120" width="170" height="210" rx="14" fill="#ffffff" opacity="0.95"/>
  <g fill="#1d4ed8">
    <rect x="134" y="148" width="122" height="24" rx="5"/>
    <rect x="134" y="188" width="122" height="24" rx="5"/>
    <rect x="134" y="228" width="122" height="24" rx="5"/>
    <rect x="134" y="268" width="122" height="24" rx="5"/>
  </g>
  <g fill="#ffffff" opacity="0.85">
    <circle cx="148" cy="160" r="4"/>
    <circle cx="148" cy="200" r="4"/>
    <circle cx="148" cy="240" r="4"/>
    <circle cx="148" cy="280" r="4"/>
  </g>

  <!-- Browser window, right -->
  <rect x="500" y="120" width="200" height="160" rx="16" fill="#ffffff" opacity="0.95"/>
  <rect x="500" y="120" width="200" height="30" rx="16" fill="#1e40af"/>
  <circle cx="516" cy="135" r="5" fill="#ffffff"/>
  <circle cx="532" cy="135" r="5" fill="#ffffff"/>
  <circle cx="548" cy="135" r="5" fill="#ffffff"/>
  <rect x="518" y="170" width="164" height="18" rx="6" fill="#3b82f6" opacity="0.5"/>
  <rect x="518" y="198" width="120" height="14" rx="6" fill="#3b82f6" opacity="0.35"/>
  <rect x="518" y="222" width="140" height="14" rx="6" fill="#3b82f6" opacity="0.35"/>

  <!-- Cookie, centre, bridging the two -->
  <circle cx="400" cy="230" r="46" fill="#f59e0b"/>
  <circle cx="400" cy="230" r="46" fill="none" stroke="#b45309" stroke-width="4"/>
  <g fill="#92400e">
    <circle cx="384" cy="212" r="6"/>
    <circle cx="416" cy="216" r="5"/>
    <circle cx="392" cy="244" r="5"/>
    <circle cx="420" cy="246" r="6"/>
    <circle cx="404" cy="228" r="4"/>
  </g>

  <!-- Bidirectional arrows connecting cookie to both sides -->
  <g stroke="#ffffff" stroke-width="10" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M290 230 H 348"/>
    <path d="M318 210 L288 230 L318 250"/>
    <path d="M452 230 H 500"/>
    <path d="M472 210 L502 230 L472 250"/>
  </g>
</svg>
